# 浣熊特工队 Pre-commit 配置
# 安装方式：pip install pre-commit && pre-commit install
# 手动检查：pre-commit run --all-files

repos:
    # 基础文件检查
    - repo: https://github.com/pre-commit/pre-commit-hooks
      rev: v5.0.0
      hooks:
          - id: trailing-whitespace
            name: 去除行尾多余空格
            exclude: '\.md$'
          - id: end-of-file-fixer
            name: 修复文件末尾换行
          - id: check-json
            name: 检查 JSON 语法
            files: '\.(json)$'
          - id: check-added-large-files
            name: 检查大文件提交
            args: ['--maxkb=500']
          - id: mixed-line-ending
            name: 统一换行符为 LF
            args: ['--fix=lf']
          - id: check-merge-conflict
            name: 检查合并冲突标记

    # 代码格式化
    - repo: https://github.com/pre-commit/mirrors-prettier
      rev: v3.1.0
      hooks:
          - id: prettier
            name: 代码格式化
            additional_dependencies:
                - prettier@3.3.3
            types_or:
                - ts
                - javascript
                - json
                - yaml
                - markdown

    # 项目级 TypeScript 类型检查
    - repo: local
      hooks:
          - id: typecheck
            name: TypeScript 类型检查
            entry: npm run typecheck
            language: system
            pass_filenames: false
            files: '\.(ts|mjs|json)$'
            stages: [pre-commit]
